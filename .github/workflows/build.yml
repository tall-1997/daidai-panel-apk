name: Build Android & iOS

on:
  push:
    branches: [ main, master, flutter-app ]
    tags: [ 'v*-flutter' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build APK
        run: flutter build apk --release
      
      - name: Get version
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | head -1 | awk '{print $2}')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
      
      - name: Rename APK
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk daidai-flutter-v${{ steps.version.outputs.VERSION }}-android.apk
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: daidai-flutter-v${{ steps.version.outputs.VERSION }}-android.apk
          if-no-files-found: error

  build-ios:
    name: Build iOS
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign
      
      - name: Get version
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | head -1 | awk '{print $2}')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
      
      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r daidai-flutter-v${{ steps.version.outputs.VERSION }}-ios.ipa Payload/
      
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: daidai-flutter-v${{ steps.version.outputs.VERSION }}-ios.ipa
          if-no-files-found: error

  release:
    name: Create Release
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: release-files
      
      - name: Download iOS IPA
        uses: actions/download-artifact@v4
        with:
          name: ios-ipa
          path: release-files
      
      - name: Get version
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | head -1 | awk '{print $2}')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
      
      - name: Generate Release Notes
        id: release_notes
        run: |
          # 检查是否有预定义的 release notes 文件
          if [ -f "docs/release-notes/${{ github.ref_name }}.md" ]; then
            echo "file=docs/release-notes/${{ github.ref_name }}.md" >> "$GITHUB_OUTPUT"
          else
            # 自动生成 release notes
            PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
            
            if [ -n "$PREV_TAG" ]; then
              CHANGES=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s" --no-merges)
            else
              CHANGES=$(git log --pretty=format:"- %s" --no-merges -10)
            fi
            
            cat > /tmp/release_notes.md << EOF
          ## 呆呆面板 Flutter App ${{ github.ref_name }}
          
          ### 更新内容
          $CHANGES
          
          ### 下载说明
          - **Android**: 下载 APK 文件安装使用
          - **iOS**: 下载 IPA 文件，通过 AltStore 或 Sideloadly 安装
          EOF
            echo "file=/tmp/release_notes.md" >> "$GITHUB_OUTPUT"
          fi
      
      - name: List release files
        run: |
          ls -la release-files/
      
      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NOTES_FILE="${{ steps.release_notes.outputs.file }}"
          
          # 检查 release 是否已存在
          if gh release view "${{ github.ref_name }}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            # 更新已存在的 release
            gh release edit "${{ github.ref_name }}" \
              --repo "${{ github.repository }}" \
              --title "v${{ steps.version.outputs.VERSION }}" \
              --notes-file "$NOTES_FILE"
            
            # 上传文件
            gh release upload "${{ github.ref_name }}" \
              --repo "${{ github.repository }}" \
              release-files/* \
              --clobber
          else
            # 创建新的 release
            gh release create "${{ github.ref_name }}" \
              --repo "${{ github.repository }}" \
              --title "v${{ steps.version.outputs.VERSION }}" \
              --notes-file "$NOTES_FILE" \
              release-files/*
          fi
