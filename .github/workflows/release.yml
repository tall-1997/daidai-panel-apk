name: Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - uses: actions/setup-go@v6
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Build Frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Resolve release notes
        id: release_notes
        shell: bash
        run: |
          candidates=(
            "docs/release-notes/${GITHUB_REF_NAME}.md"
            "docs/release-notes/${{ steps.version.outputs.VERSION }}.md"
          )

          for candidate in "${candidates[@]}"; do
            if [[ -f "$candidate" ]]; then
              echo "file=$candidate" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done

          # 自动生成 release notes
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s" --no-merges)
          else
            CHANGES=$(git log --pretty=format:"- %s" --no-merges -10)
          fi
          
          cat > /tmp/release_notes.md << EOF
          ## 呆呆面板 ${{ github.ref_name }}
          
          ### 更新内容
          $CHANGES
          
          ### 下载说明
          - **Linux**: 下载对应架构的 tar.gz 文件
          - **Windows**: 下载 zip 文件解压运行
          - **Docker**: 使用 \`docker pull linzixuanzz/daidai-panel:${{ steps.version.outputs.VERSION }}\`
          EOF
          echo "file=/tmp/release_notes.md" >> "$GITHUB_OUTPUT"

      - name: Build Linux amd64
        working-directory: server
        env:
          CGO_ENABLED: '0'
          GOOS: linux
          GOARCH: amd64
        run: go build -ldflags="-s -w -X daidai-panel/handler.Version=${{ steps.version.outputs.VERSION }}" -o daidai-linux-amd64 .

      - name: Build Linux arm64
        working-directory: server
        env:
          CGO_ENABLED: '0'
          GOOS: linux
          GOARCH: arm64
        run: go build -ldflags="-s -w -X daidai-panel/handler.Version=${{ steps.version.outputs.VERSION }}" -o daidai-linux-arm64 .

      - name: Build Linux 386
        working-directory: server
        env:
          CGO_ENABLED: '0'
          GOOS: linux
          GOARCH: '386'
        run: go build -ldflags="-s -w -X daidai-panel/handler.Version=${{ steps.version.outputs.VERSION }}" -o daidai-linux-386 .

      - name: Build Linux armv7
        working-directory: server
        env:
          CGO_ENABLED: '0'
          GOOS: linux
          GOARCH: arm
          GOARM: '7'
        run: go build -ldflags="-s -w -X daidai-panel/handler.Version=${{ steps.version.outputs.VERSION }}" -o daidai-linux-armv7 .

      - name: Build Windows amd64
        working-directory: server
        env:
          CGO_ENABLED: '0'
          GOOS: windows
          GOARCH: amd64
        run: |
          go build -ldflags="-s -w -X daidai-panel/handler.Version=${{ steps.version.outputs.VERSION }}" -o daidai-server.exe .
          go build -ldflags="-s -w -X daidai-panel/handler.Version=${{ steps.version.outputs.VERSION }}" -o ddp.exe ./cmd/ddp

      - name: Package
        run: |
          mkdir -p release
          cp server/config.yaml release/ 2>/dev/null || true
          cp -r web/dist release/web

          cp server/daidai-linux-amd64 release/
          cd release && tar -czvf ../daidai-linux-amd64.tar.gz daidai-linux-amd64 config.yaml web/
          rm daidai-linux-amd64

          cp ../server/daidai-linux-arm64 .
          tar -czvf ../daidai-linux-arm64.tar.gz daidai-linux-arm64 config.yaml web/
          rm daidai-linux-arm64

          cp ../server/daidai-linux-386 .
          tar -czvf ../daidai-linux-386.tar.gz daidai-linux-386 config.yaml web/
          rm daidai-linux-386

          cp ../server/daidai-linux-armv7 .
          tar -czvf ../daidai-linux-armv7.tar.gz daidai-linux-armv7 config.yaml web/
          cd ..

          # Windows 单机版：二进制 + 独立 config.yaml + start.bat + README，
          # 同梱前端 dist，整个解压即用；Go 后端通过 server.web_dir 直接托管前端。
          win_staging="release-windows/daidai-panel-windows-amd64"
          mkdir -p "$win_staging/web"
          cp server/daidai-server.exe "$win_staging/"
          cp server/ddp.exe "$win_staging/"
          cp -r web/dist/. "$win_staging/web/"
          cp packaging/windows/config.yaml "$win_staging/config.yaml"
          cp packaging/windows/start.bat "$win_staging/start.bat"
          cp packaging/windows/README.txt "$win_staging/README.txt"
          (cd release-windows && zip -rq ../daidai-windows-amd64.zip daidai-panel-windows-amd64)

      - name: Create Or Update Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          NOTES_FILE="${{ steps.release_notes.outputs.file }}"
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release edit "${GITHUB_REF_NAME}" \
              --title "${GITHUB_REF_NAME}" \
              --notes-file "$NOTES_FILE"
            gh release upload "${GITHUB_REF_NAME}" \
              daidai-linux-amd64.tar.gz \
              daidai-linux-arm64.tar.gz \
              daidai-linux-386.tar.gz \
              daidai-linux-armv7.tar.gz \
              daidai-windows-amd64.zip \
              --clobber
          else
            gh release create "${GITHUB_REF_NAME}" \
              daidai-linux-amd64.tar.gz \
              daidai-linux-arm64.tar.gz \
              daidai-linux-386.tar.gz \
              daidai-linux-armv7.tar.gz \
              daidai-windows-amd64.zip \
              --title "${GITHUB_REF_NAME}" \
              --notes-file "$NOTES_FILE"
          fi

  magisk-module:
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v5

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build Frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Compute versionCode
        id: vercode
        shell: bash
        run: |
          # 把 "2.0.6" -> "20006" 这样的 versionCode，方便 Magisk 比较
          V="${{ steps.version.outputs.VERSION }}"
          IFS='.' read -r MAJ MIN PATCH <<< "$V"
          MAJ=${MAJ:-0}; MIN=${MIN:-0}; PATCH=${PATCH:-0}
          CODE=$(( MAJ * 10000 + MIN * 100 + PATCH ))
          echo "VERSIONCODE=${CODE}" >> "$GITHUB_OUTPUT"

      - name: Build Magisk Module (universal arm64 + amd64)
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.VERSION }}"

          # 直接复用 Magisk/build.sh —— 保证本地打包与 CI 产物结构一致
          # 该脚本会同时编译 arm64 / amd64 后端、拷贝 system/bin/rurima、apk/、
          # 同步 version 与 versionCode、打包 ZIP 到 dist/ 目录。
          bash Magisk/build.sh "$VERSION" all

          OUT="daidai-panel-magisk-v${VERSION}.zip"
          cp -f "dist/${OUT}" "${OUT}"

          ls -lh "${OUT}"
          echo "ZIPFILE=${OUT}" >> "$GITHUB_ENV"

      - name: Sync update.json
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.VERSION }}"
          VERSIONCODE="${{ steps.vercode.outputs.VERSIONCODE }}"
          REPO="${GITHUB_REPOSITORY}"

          # 优先使用仓库内的 release notes，若缺失则回退到 GitHub Release 页
          CHANGELOG_URL="https://raw.githubusercontent.com/${REPO}/main/docs/release-notes/v${VERSION}.md"
          if [ ! -f "docs/release-notes/v${VERSION}.md" ]; then
            CHANGELOG_URL="https://github.com/${REPO}/releases/tag/v${VERSION}"
          fi

          cat > Magisk/update.json <<EOF
          {
            "version": "v${VERSION}",
            "versionCode": ${VERSIONCODE},
            "zipUrl": "https://github.com/${REPO}/releases/download/v${VERSION}/daidai-panel-magisk-v${VERSION}.zip",
            "changelog": "${CHANGELOG_URL}"
          }
          EOF
          echo "-- update.json --"
          cat Magisk/update.json

      - name: Upload Magisk Module to Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            "${ZIPFILE}" \
            Magisk/update.json \
            --clobber
          echo "Magisk 模块与 update.json 已上传到 Release ${GITHUB_REF_NAME}"

  docker-alpine:
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v5

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          # Alpine 镜像基础层 alpine:3.19 在 amd64 / arm64 / 386 / arm/v7 都有 manifest，
          # 所以这里统一覆盖四个平台（含 32 位）。
          platforms: linux/amd64,linux/arm64,linux/386,linux/arm/v7
          push: true
          build-args: VERSION=${{ steps.version.outputs.VERSION }}
          cache-from: type=gha,scope=alpine
          cache-to: type=gha,mode=max,scope=alpine
          tags: |
            linzixuanzz/daidai-panel:latest
            linzixuanzz/daidai-panel:${{ steps.version.outputs.VERSION }}

  docker-debian:
    runs-on: ubuntu-latest
    needs: docker-alpine
    steps:
      - uses: actions/checkout@v5

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Debian multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.debian
          # Debian 镜像第二阶段用的 node:20.19.0-bookworm-slim 官方不提供 linux/386 manifest，
          # 所以这里不能加 linux/386；linux/arm/v7 是 node 官方支持的 32 位 ARM 平台，可以加上。
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          build-args: VERSION=${{ steps.version.outputs.VERSION }}
          cache-from: type=gha,scope=debian
          cache-to: type=gha,mode=max,scope=debian
          tags: |
            linzixuanzz/daidai-panel:debian
